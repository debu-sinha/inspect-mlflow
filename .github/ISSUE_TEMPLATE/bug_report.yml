name: Bug Report
description: Report a bug in inspect-mlflow
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: inspect-mlflow version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: inspect-version
    attributes:
      label: inspect-ai version
      placeholder: "0.3.190"
    validations:
      required: true

  - type: input
    id: mlflow-version
    attributes:
      label: MLflow version
      placeholder: "3.10.1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
